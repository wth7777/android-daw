name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Clean workspace
      run: |
        rm -rf ~/.gradle/caches
        rm -rf app/.cxx
        git clean -fdx

    - name: Copy Oboe to app native libs
      run: |
        mkdir -p app/src/main/cpp/libs
        cp -r libs/Oboe app/src/main/cpp/libs/

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        accept-android-sdk-licenses: true
        packages: >
          platform-tools
          build-tools;30.0.3
          platforms;android-33

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Verify NDK installation
      run: |
        echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
        ls -la $ANDROID_NDK_ROOT

    - name: Accept SDK licenses
      run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Build Debug APK with verbose output
      id: build
      run: |
        # First do a clean build
        ./gradlew clean --no-daemon
        # Build with explicit output
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle-build.log
        exit_code=${PIPESTATUS[0]}
        echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
        # Always list outputs
        echo "=== Build outputs ==="
        find app/build -name "*.apk" -type f 2>/dev/null
        echo "=== APK directory contents ==="
        ls -laR app/build/outputs/apk/ 2>/dev/null || echo "No APK directory"
        exit $exit_code

    - name: Check APK exists
      if: steps.build.outcome == 'success'
      run: |
        echo "=== Looking for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK dir"
        ls -la app/build/outputs/apk/ 2>/dev/null || echo "No APK dir at all"

    - name: Upload build log on failure
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: gradle-build-log
        path: gradle-build.log
        retention-days: 7
        if-no-files-found: ignore

    - name: Print CMake/Ninja failure details
      if: steps.build.outcome != 'success'
      run: |
        echo "=== Looking for .cxx logs ==="
        find app/.cxx -type f -name "*.log" -exec echo "=== {} ===" \; -exec cat {} \; || true
        echo "=== Trying ninja verbose ==="
        NINJA_DIR=$(find app/.cxx -name "arm64-v8a" -type d |head -1)
        if [ -n "$NINJA_DIR" ]; then
          cd "$NINJA_DIR"
          ninja -v daw_jni 2>&1 | tee ninja.log || true
        fi
      continue-on-error: true

    - name: Upload Ninja log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ninja-log
        path: ninja.log
        retention-days: 7
        if-no-files-found: ignore

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: DAW-Debug-APK
        path: |-
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/**/*.apk
          app/build/**/*.apk
        retention-days: 30
        if-no-files-found: warn

    - name: Fail if build failed
      if: steps.build.outcome != 'success'
      run: exit 1