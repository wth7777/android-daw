name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: 17
      NDK_VERSION: r27d

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        accept-android-sdk-licenses: true
        packages: |
          platform-tools
          build-tools;34.0.0
          platforms;android-34
          cmake;3.22.1

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: ${{ env.NDK_VERSION }}
        add-to-path: false

    - name: Export NDK environment
      run: |
        echo "ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

    - name: Accept SDK licenses
      run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('*.gradle*', 'gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Clean and Build Debug APK
      run: |
        ./gradlew clean --no-daemon
        ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee gradle-build.log

    - name: List built APKs
      run: |
        echo "=== APK files found ==="
        find . -name "*.apk" -type f || echo "No APK found"
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK directory"

    - name: Upload Gradle Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: gradle-build-log
        path: gradle-build.log
        retention-days: 7

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: DAW-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
        if-no-files-found: warn