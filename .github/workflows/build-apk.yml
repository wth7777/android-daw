name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
    - name: Checkout repository with submodules
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Verify and initialize submodules
      run: |
        echo "=== Submodule status before init ==="
        git submodule status || true
        echo "=== Running submodule init ==="
        git submodule update --init --recursive
        echo "=== Submodule status after init ==="
        git submodule status
        echo "=== Listing libs directory ==="
        ls -R libs
        echo "=== Checking submodule status ==="
        git submodule status
        git submodule update --init --recursive
        echo "=== Submodule status after update ==="
        git submodule status

    - name: Verify Oboe installation
      run: |
        echo "=== Checking libs/Oboe ==="
        ls -la libs/Oboe/ || echo "Oboe directory not found!"
        if [ -f "libs/Oboe/CMakeLists.txt" ]; then
          echo "✓ Oboe CMakeLists.txt found"
        else
          echo "✗ Oboe CMakeLists.txt MISSING - trying to clone directly"
          rm -rf libs/Oboe
          git clone https://github.com/google/oboe.git libs/Oboe
        fi
        echo "=== Final Oboe directory ==="
        ls -la libs/Oboe/

    - name: Clean build environment
      run: |
        rm -rf .gradle
        rm -rf app/.cxx
        rm -rf ~/.gradle/caches
        mkdir -p app/src/main/cpp/libs

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        accept-android-sdk-licenses: true
        packages: 'platform-tools build-tools;30.0.3 platforms;android-33'

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Accept SDK licenses
      run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Print CMakeLists.txt for debugging
      run: |
        echo "=== Current CMakeLists.txt ==="
        cat app/src/main/cpp/CMakeLists.txt
        echo "=== End CMakeLists.txt ==="

    - name: Gradle clean
      run: ./gradlew clean --no-daemon || echo "Gradle clean failed, continuing..."

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log

    - name: Upload build logs on failure
      if: failure()
      run: |
        echo "=== Gradle log ==="
        cat /tmp/gradle.log
        echo "=== Ninja logs ==="
        find /home/runner/work/android-daw/android-daw/app/.cxx -name "*.log" -exec echo "--- {} ---" \; -exec cat {} \; 2>/dev/null || true
        echo "=== CMakeFiles ==="
        find /home/runner/work/android-daw/android-daw/app/.cxx -name "CMakeError.log" -exec cat {} \; 2>/dev/null || true

    - name: Upload Debug APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: DAW-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
        if-no-files-found: warn

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          app/build/reports
          app/.cxx
          ~/.gradle/caches
        retention-days: 7
        if-no-files-found: ignore
