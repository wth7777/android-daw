name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:  # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Opt‑in to Node.js 24 now (pre‑empt deprecation warnings)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        accept-android-sdk-licenses: true
        packages: tools platform-tools platform-tools build-tools;30.0.3 platforms;android-33

    # Ensure any remaining licenses are accepted non‑interactively (defensive)
    - name: Accept all SDK licenses (non‑interactive)
      run: |
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: DAW-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Build Release APK (if needed)
      if: github.event_name == 'workflow_dispatch'
      run: ./gradlew assembleRelease --no-daemon

    - name: Upload Release APK (if needed)
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@v4
      with:
        name: DAW-Release-APK
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
