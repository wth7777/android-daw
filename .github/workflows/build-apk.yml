name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Clean repository and workspace
      run: |
        git reset --hard ${{ github.sha }}
        git clean -fdx
        rm -rf .gradle
        rm -rf app/.cxx

    - name: Copy Oboe to app native libs
      run: |
        mkdir -p app/src/main/cpp/libs
        cp -r libs/Oboe app/src/main/cpp/libs/

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        accept-android-sdk-licenses: true
        packages: tools platform-tools platform-tools build-tools;30.0.3 platforms;android-33

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Accept all SDK licenses (non‑interactive)
      run: |
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Gradle clean
      run: ./gradlew clean --no-daemon

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: DAW-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Build Release APK (if needed)
      if: github.event_name == 'workflow_dispatch'
      run: ./gradlew assembleRelease --no-daemon

    - name: Upload Release APK (if needed)
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@v4
      with:
        name: DAW-Release