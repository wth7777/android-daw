name: Build Android APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean Gradle caches & reinstall build-tools
        run: |
          rm -rf ~/.gradle/caches
          # Ensure build-tools 34.0.0 is installed fresh
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" 2>&1 | tail -5
          ls -la $ANDROID_HOME/build-tools/34.0.0/ 2>/dev/null || echo "Build-tools dir not found"

      - name: Build Debug APK
        id: build
        run: |
          ./gradlew clean assembleDebug --no-daemon --no-build-cache 2>&1 | tee gradle-build.log
          find app/build -name "*.apk" -type f 2>/dev/null || echo "APK not found"

      - name: Upload Debug APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: DAW-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload build log on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Fail if build failed
        if: steps.build.outcome != 'success'
        run: exit 1