name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:  # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: ./android-daw
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
      working-directory: ./android-daw
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: DAW-Debug-APK
        path: android-daw/app/build/outputs/apk/debug/*.apk
        retention-days: 30
    
    - name: Build Release APK (if needed)
      if: github.event_name == 'workflow_dispatch'
      run: ./gradlew assembleRelease --no-daemon
      working-directory: ./android-daw
    
    - name: Upload Release APK (if needed)
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@v4
      with:
        name: DAW-Release-APK
        path: android-daw/app/build/outputs/apk/release/*.apk
        retention-days: 30
