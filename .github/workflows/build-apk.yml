name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        accept-android-sdk-licenses: true

    - name: Install required SDK components
      run: |
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0"

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Show project structure
      run: |
        echo "=== Project structure ==="
        ls -la
        echo ""
        echo "=== App source dirs ==="
        ls -la app/src/main/
        echo ""
        echo "=== Kotlin sources ==="
        find app/src/main/kotlin -name "*.kt" 2>/dev/null || echo "No kotlin dir"
        echo ""
        echo "=== Java sources ==="
        find app/src/main/java -name "*.java" 2>/dev/null || echo "No java dir"

    - name: Build Debug APK
      run: |
        echo "=== Running Gradle build ==="
        ./gradlew clean assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
        BUILD_EXIT=${PIPESTATUS[0]}
        echo ""
        echo "=== Gradle exit code: $BUILD_EXIT ==="
        
        # Always show last 50 lines of build log
        echo ""
        echo "=== Last 50 lines of build log ==="
        tail -50 build.log
        
        if [ $BUILD_EXIT -ne 0 ]; then
          echo "BUILD FAILED with exit code $BUILD_EXIT"
          exit 1
        fi

    - name: Find APK files
      run: |
        echo "=== Looking for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null
        echo ""
        echo "=== Checking app/build/outputs ==="
        ls -laR app/build/outputs/ 2>/dev/null || echo "No outputs directory!"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: DAW-debug-apk
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/*/*.apk
          app/build/outputs/**/*.apk
        retention-days: 7
        if-no-files-found: error

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        retention-days: 7