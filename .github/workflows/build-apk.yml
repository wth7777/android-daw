name: Build Android APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          packages: |
            platform-tools
            build-tools;30.0.3
            platforms;android-33

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Accept SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build Debug APK
        id: build
        run: |
          ./gradlew clean assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle-build.log
          find app/build -name "*.apk" -type f 2>/dev/null

      - name: Upload Debug APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: DAW-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Fail if build failed
        if: steps.build.outcome != 'success'
        run: exit 1