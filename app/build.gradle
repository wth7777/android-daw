plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.daw'
    ndkVersion "25.2.9519653"
    compileSdk 34

    defaultConfig {
        applicationId "com.example.daw"
        minSdk 24
        targetSdk 34
        versionCode 2
        versionName "0.2-DAW"
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++11"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    buildTypes {
        debug {
            // default debug (the sine-wave demo)
        }
        dawDebug {
            initWith debug
        }
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.10.0'
}