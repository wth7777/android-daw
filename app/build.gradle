plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.daw'
    ndkVersion "25.2.9519653"
    compileSdk 34

    defaultConfig {
        applicationId "com.example.daw"
        minSdk 24
        targetSdk 34
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++11"
                version "3.22.1"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.10.0'
}